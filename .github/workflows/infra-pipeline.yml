name: Infrastructure Pipeline

on:
  push:
    branches: [ test, main ]
    paths:
      - 'infra/**'
      - '.github/workflows/infra-pipeline.yml'
  pull_request:
    branches: [ test, main ]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - prod
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      auto_approve:
        description: 'Auto approve Terraform apply'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  TERRAFORM_VERSION: '1.6.0'
  AWS_REGION: 'us-east-1'

jobs:
  validate:
    name: Validate Terraform Configuration
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Validation
      run: |
        cd infra
        # Validate for both environments
        for env in test prod; do
          echo "Validating $env environment..."
          terraform init -backend=false
          terraform validate
        done
      continue-on-error: true

  security_scan:
    name: Infrastructure Security Scan
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Checkov
      id: checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: infra/
        framework: terraform
        output_format: sarif
        output_file_path: checkov-results.sarif
      continue-on-error: true

    - name: Upload Checkov results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: checkov-results.sarif
      continue-on-error: true

  plan_test:
    name: Plan Test Environment
    runs-on: ubuntu-latest
    needs: [validate, security_scan]
    if: (github.event_name == 'pull_request' && github.base_ref == 'test') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'test')
    environment: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Init
      run: |
        cd infra
        terraform init -backend-config=envs/test/backend.tf -reconfigure

    - name: Terraform Plan
      run: |
        cd infra
        terraform plan -var-file=envs/test/test.tfvars -out=tfplan-test
        terraform show -no-color tfplan-test > plan-output-test.txt

    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-test
        path: infra/tfplan-test

    - name: Comment Plan on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('infra/plan-output-test.txt', 'utf8');
          const output = `## 🏗️ Terraform Plan for Test Environment
          
          <details><summary>📋 Click to view Terraform Plan</summary>
          
          \`\`\`terraform
          ${plan}
          \`\`\`
          
          </details>
          
          **Environment:** Test
          **Action:** Plan
          **Status:** ✅ Plan generated successfully`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });

  apply_test:
    name: Apply Test Environment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/test' && github.event_name == 'push'
    environment: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Init
      run: |
        cd infra
        terraform init -backend-config=envs/test/backend.tf -reconfigure

    - name: Terraform Apply
      run: |
        cd infra
        terraform apply -var-file=envs/test/test.tfvars -auto-approve

  plan_prod:
    name: Plan Production Environment
    runs-on: ubuntu-latest
    needs: [validate, security_scan]
    if: (github.event_name == 'pull_request' && github.base_ref == 'main') || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Init
      run: |
        cd infra
        terraform init -backend-config=envs/prod/backend.tf -reconfigure

    - name: Terraform Plan
      run: |
        cd infra
        terraform plan -var-file=envs/prod/prod.tfvars -out=tfplan-prod
        terraform show -no-color tfplan-prod > plan-output-prod.txt

    - name: Upload Plan Artifact
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan-prod
        path: infra/tfplan-prod

    - name: Comment Plan on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('infra/plan-output-prod.txt', 'utf8');
          const output = `## 🚀 Terraform Plan for Production Environment
          
          <details><summary>📋 Click to view Terraform Plan</summary>
          
          \`\`\`terraform
          ${plan}
          \`\`\`
          
          </details>
          
          **Environment:** Production
          **Action:** Plan
          **Status:** ✅ Plan generated successfully
          **⚠️ Note:** This will be applied to PRODUCTION after merge!`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });

  apply_prod:
    name: Apply Production Environment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Init
      run: |
        cd infra
        terraform init -backend-config=envs/prod/backend.tf -reconfigure

    - name: Terraform Apply
      run: |
        cd infra
        terraform apply -var-file=envs/prod/prod.tfvars -auto-approve

  destroy:
    name: Destroy Infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'destroy'
    environment: ${{ inputs.environment }}-destroy
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: Terraform Init
      run: |
        cd infra
        terraform init -backend-config=envs/${{ inputs.environment }}/backend.tf -reconfigure

    - name: Terraform Destroy
      run: |
        cd infra
        terraform destroy -var-file=envs/${{ inputs.environment }}/${{ inputs.environment }}.tfvars ${{ inputs.auto_approve && '-auto-approve' || '' }}

